<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Recruitment Portal - Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b') no-repeat center center/cover;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    /* Overlay for readability */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }

    nav {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.7);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 2;
    }

    nav .logo {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    nav ul li a:hover {
      color: #f1c40f;
    }

    .welcome-container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 3rem 2.5rem;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      max-width: 600px;
      width: 90%;
      animation: fadeIn 1.2s ease;
      z-index: 1;
      backdrop-filter: blur(6px);
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 0.8rem;
      color: #f9f9f9;
    }

    p {
      font-size: 1rem;
      margin-bottom: 2rem;
      color: #eaeaea;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 1.8rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .btn-student {
      background: #3498db;
      color: #fff;
    }

    .btn-student:hover {
      background: #2980b9;
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(52,152,219,0.4);
    }

    .btn-company {
      background: #2ecc71;
      color: #fff;
    }

    .btn-company:hover {
      background: #27ae60;
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(46,204,113,0.4);
    }

    footer {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #ccc;
    }

    footer a {
      color: #f1c40f;
      text-decoration: none;
      margin: 0 0.5rem;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Mobile friendly */
    @media (max-width: 600px) {
      nav ul {
        flex-direction: column;
        background: rgba(0, 0, 0, 0.8);
        padding: 1rem;
        border-radius: 10px;
      }
      .btn-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">🎓 Campus Portal</div>
    <ul>
      <li><a href="{% url 'welcome' %}">Home</a></li>
      <li><a href="{% url 'jobs_list' %}">Jobs</a></li>   
      <li><a href="{% url 'student_register' %}">For Students</a></li>
      <li><a href="{% url 'company_registration' %}">For Employers</a></li>
      <li><a href="{% url 'login' %}">Login</a></li>
    </ul>
  </nav>

  <div class="welcome-container">
    <h1>Welcome 🎉</h1>
    <p>Campus Recruitment Portal – Connecting Students & Companies</p>
    <div class="btn-group">
      <button class="btn btn-student" aria-label="Join as Student" onclick="location.href='{% url 'student_register' %}'">
        🎓 Join as Student
      </button>
      <button class="btn btn-company" aria-label="Join as Employer" onclick="location.href='{% url 'company_registration' %}'">
        🏢 Join as Employer
      </button>
    </div>
    <footer>
      © 2025 Campus Recruitment Portal | 
      <a href="{% url 'about' %}">About</a> | 
      <a href="{% url 'contact' %}">Contact</a>
    </footer>
  </div>
</body>
</html>
